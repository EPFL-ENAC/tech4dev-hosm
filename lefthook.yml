#   Refer for explanation to following link:
#   https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  commands:
    frontend-typecheck:
      root: frontend
      glob: "frontend/src/**/*.{ts,vue}"
      exclude: "frontend/third-party/**"
      run: npx --no -- vue-tsc --noEmit --project tsconfig.typecheck.json
    frontend-lint:
      root: frontend
      glob: "frontend/src/**/*.{ts,js,cjs,mjs,vue}"
      exclude: "frontend/third-party/**"
      run: npx --no -- eslint -c eslint.config.js {staged_files}
    frontend-format:
      root: frontend
      glob: "frontend/src/**/*.{js,ts,vue,scss,html,md,json}"
      exclude: "frontend/third-party/**"
      run: npx --no -- prettier --write {staged_files} --ignore-path .gitignore && git add {staged_files}
    backend-typecheck:
      root: backend
      glob: "backend/{api,tests}/**/*.py"
      run: uvx ty check {staged_files}
    backend-lint:
      root: backend
      glob: "backend/{api,tests}/**/*.py"
      run: uvx ruff check --fix --select I {staged_files} && git add {staged_files}
    backend-format:
      root: backend
      glob: "backend/{api,tests}/**/*.py"
      run: uvx ruff format {staged_files} && git add {staged_files}
    codespell:
      run: uvx codespell --skip="frontend/package-lock.json,frontend/src/i18n/fr/index.ts" --ignore-words-list="selectin" {staged_files}

commit-msg:
  commands:
    commitlint:
      run: npx --yes -p "@commitlint/cli" -p "@commitlint/config-conventional" -- commitlint --edit {1}
