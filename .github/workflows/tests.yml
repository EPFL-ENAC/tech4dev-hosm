name: tests

on:
  push:
    branches:
      - main
      - stage
      - dev
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install uv and Python dependencies
        run: |
          pip install uv
          make install

      - name: Run tests
        run: make test
