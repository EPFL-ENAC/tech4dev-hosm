services:
  postgres:
    image: postgres:18.3-alpine
    expose:
      - 5432
    ports:
      - '5432:5432'
    environment:
        - POSTGRES_USER=${DB_USER}
        - POSTGRES_PASSWORD=${DB_PASSWORD}
        - POSTGRES_DB=${DB_NAME}
        - POSTGRES_HOST=postgres
    volumes:
      - postgres:/var/lib/postgresql/data

volumes:
  postgres:
    driver: local
